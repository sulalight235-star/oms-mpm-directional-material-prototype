<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMS-MPM 定向物料生成原型</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 56px;
      max-width: 560px;
      width: 100%;
    }
    .badge {
      display: inline-block;
      background: #e8f4ff;
      color: #1677ff;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
      font-weight: 500;
    }
    h1 {
      font-size: 22px;
      color: #1a1a1a;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }
    .section-title {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a1a;
      transition: all 0.18s;
    }
    .link-item:hover {
      border-color: #1677ff;
      background: #f0f7ff;
      color: #1677ff;
    }
    .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .icon-blue  { background: #e8f4ff; }
    .icon-green { background: #e8fff0; }
    .icon-orange{ background: #fff7e6; }
    .icon-purple{ background: #f5f0ff; }
    .link-text { font-size: 14px; font-weight: 500; }
    .link-desc { font-size: 12px; color: #aaa; margin-top: 2px; }
    .footer {
      font-size: 12px;
      color: #ccc;
      text-align: center;
      border-top: 1px solid #f0f0f0;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">原型预览</div>
    <h1>OMS-MPM 定向物料生成</h1>
    <p class="subtitle">点击下方页面进入对应原型预览</p>

    <div class="section-title">原型页面</div>
    <div class="links">
      <a class="link-item" href="oms-mpm-物料工作台原型.html">
        <div class="icon icon-blue">🗂️</div>
        <div>
          <div class="link-text">物料工作台原型</div>
          <div class="link-desc">定向物料生成主入口页面</div>
        </div>
      </a>
      <a class="link-item" href="待我审核.html">
        <div class="icon icon-orange">📋</div>
        <div>
          <div class="link-text">待我审核</div>
          <div class="link-desc">待审核物料列表页面</div>
        </div>
      </a>
      <a class="link-item" href="我发起的.html">
        <div class="icon icon-green">📤</div>
        <div>
          <div class="link-text">我发起的</div>
          <div class="link-desc">我发起的物料申请列表</div>
        </div>
      </a>
      <a class="link-item" href="审核结果.html">
        <div class="icon icon-purple">✅</div>
        <div>
          <div class="link-text">审核结果</div>
          <div class="link-desc">物料审核结果查看页面</div>
        </div>
      </a>
      <a class="link-item" href="物料审核详情.html">
        <div class="icon icon-blue">🔍</div>
        <div>
          <div class="link-text">物料审核详情</div>
          <div class="link-desc">单条物料审核详情页面</div>
        </div>
      </a>
    </div>

    <div class="footer">OMS-MPM 定向物料生成原型 · 仅供内部评审使用</div>
  </div>
</body>
</html>
